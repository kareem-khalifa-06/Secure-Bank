<div class="page-shell">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-icon">
      <i class="fa-solid fa-right-left"></i>
    </div>
    <div>
      <h3>Fund Transfer</h3>
      <p>Transfer money between accounts securely</p>
    </div>
  </div>

  <div class="transfer-grid">

    <!-- LEFT: Form -->
    <div class="card">
      <div class="card-section-title">
        <i class="fa-solid fa-right-left"></i>
        Transfer Details
      </div>

      <form [formGroup]="transferForm" class="transfer-form">

        <!-- From Account -->
        <div class="form-group">
          <label>From Account</label>
          <div class="input-wrap">
            <i class="fa-solid fa-building-columns input-icon"></i>
            <select class="form-input" formControlName="fromAccountNo">
              <option value="" disabled>Select your account</option>
              @for (a of senderAccounts; track a.id) {
                <option [value]="a.accountNo">
                  {{ a.accountNo }} — {{ a.accountType }} ({{ a.balance | currency }})
                </option>
              }
            </select>
          </div>
        </div>

        <!-- Arrow divider -->
        <div class="arrow-divider">
          <div class="arrow-line"></div>
          <div class="arrow-circle">
            <i class="fa-solid fa-arrow-down"></i>
          </div>
          <div class="arrow-line"></div>
        </div>

        <!-- To Account -->
        <div class="form-group">
          <label>To Account</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user input-icon"></i>
            <select class="form-input" formControlName="ToAccountNo">
              <option value="" disabled>Select recipient account</option>
              @for (account of reciverAccounts; track account.id) {
                <option [value]="account.accountNo" [disabled]="getSelectedSender()?.accountNo===account.accountNo">
                  {{ account.accountNo  }} -- {{account.username}}
                </option>
              }
            </select>
          </div>
        </div>

        <!-- Amount -->
        <div class="form-group">
          <label>Amount</label>
          <div class="input-wrap">
            <i class="fa-solid fa-dollar-sign input-icon"></i>
            <input type="number" class="form-input" placeholder="0.00"
              formControlName="amount" min="0" step="0.01" />
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label>Description <span class="optional">(optional)</span></label>
          <div class="input-wrap">
            <i class="fa-solid fa-pen input-icon"></i>
            <input type="text" class="form-input" placeholder="What's this transfer for?"
              formControlName="description" />
          </div>
        </div>

        <!-- Submit — passes the matching sender account -->
        <button type="button" class="transfer-btn"
          (click)="transferFunds(getSelectedSender())">
          <i class="fa-solid fa-paper-plane"></i>
          Transfer Funds
        </button>

      </form>
    </div>

    <!-- RIGHT: Account Info -->
    <div class="card">
      <div class="card-section-title">
        <i class="fa-solid fa-wallet"></i>
        Your Accounts
      </div>

      <div class="accounts-list">
        @for (a of senderAccounts; track a.id) {
          <div class="account-card"
            [class.account-selected]="a.accountNo === transferForm.get('fromAccountNo')?.value"
            (click)="transferForm.get('fromAccountNo')?.setValue(a.accountNo)">
            <div class="account-card-left">
              <div class="account-avatar">
                <i class="fa-solid fa-credit-card"></i>
              </div>
              <div>
                <div class="account-no">{{ a.accountNo }}</div>
                <div class="account-type-badge">{{ a.accountType }}</div>
              </div>
            </div>
            <div class="account-card-right">
              <div class="balance-label">Balance</div>
              <div class="balance-value">{{ a.balance | currency }}</div>
            </div>
          </div>
        }
      </div>
    </div>

  </div>
</div>
