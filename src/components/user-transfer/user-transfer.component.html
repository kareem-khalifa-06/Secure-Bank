<div class="ft-shell">

  <!-- Header -->
  <div class="ft-header">
    <div class="ft-header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="12" rx="2" stroke="#C9A84C" stroke-width="2" fill="none"/>
        <path d="M6 10h12M6 14h8" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h3 class="ft-title">Fund Transfer</h3>
      <p class="ft-subtitle">Transfer money between accounts securely</p>
    </div>
  </div>

  <!-- Two columns -->
  <div class="ft-grid">

    <!-- LEFT: Form -->
    <div class="ft-card">
      <div class="ft-card-head">
        <span class="ft-card-head-icon">⇄</span>
        <div>
          <h6 class="ft-card-title">Transfer Details</h6>
          <p class="ft-card-sub">Enter the transfer information below</p>
        </div>
      </div>

      <form [formGroup]="transferForm" class="ft-form">

        <div class="ft-field">
          <label class="ft-label" for="fromAccountNo">From Account</label>
          <div class="ft-input-wrap">
            <span class="ft-input-icon">🏦</span>
            <select id="fromAccountNo" name="fromAccountNo" class="ft-select" formControlName="fromAccountNo">
              <option [value]="account.accountNo">{{ account.accountNo }}</option>
            </select>
          </div>
        </div>

        <div class="ft-divider">
          <hr class="ft-divider-line"/>
          <div class="ft-divider-icon">⇅</div>
          <hr class="ft-divider-line"/>
        </div>

        <div class="ft-field">
          <label class="ft-label" for="toAccountNo">To Account</label>
          <div class="ft-input-wrap">
            <span class="ft-input-icon">👤</span>
            <select id="toAccountNo" name="toAccountNo" class="ft-select" formControlName="ToAccountNo">
              @for(account of accounts; track $index) {
                <option [value]="account?.accountNo">{{ account?.accountNo  }}</option>
              }
            </select>
          </div>
        </div>

        <div class="ft-field">
          <label class="ft-label" for="amount">Amount</label>
          <div class="ft-input-wrap">
            <span class="ft-input-icon">$</span>
            <input
              type="number"
              id="amount"
              class="ft-input"
              placeholder="0.00"
              formControlName="amount"
              min="0"
              step="0.01"
            />
          </div>
        </div>

        <div class="ft-field">
          <label class="ft-label" for="description">
            Description <span class="ft-optional">(optional)</span>
          </label>
          <div class="ft-input-wrap">
            <span class="ft-input-icon">✎</span>
            <input
              type="text"
              id="description"
              class="ft-input"
              placeholder="Transfer description"
              formControlName="description"
            />
          </div>
        </div>

        <button type="button" class="ft-btn" (click)="transferFunds()">
          Transfer Funds →
        </button>

      </form>
    </div>

    <!-- RIGHT: Account Info -->
    <div class="ft-card">
      <div class="ft-card-head">
        <span class="ft-card-head-icon">◉</span>
        <div>
          <h6 class="ft-card-title">Your Accounts</h6>
          <p class="ft-card-sub">Current balances of your accounts</p>
        </div>
      </div>

      <div class="ft-account-card">
        <div class="ft-account-meta">
          <div class="ft-account-type">{{ account.accountType }}</div>
          <div class="ft-account-id">Account ID: {{ account.id }}</div>
          <div class="ft-account-badge">● Active</div>
        </div>
        <div class="ft-account-right">
          <div class="ft-balance-label">Balance</div>
          <div class="ft-balance">{{ account.balance | currency }}</div>
        </div>
      </div>

    </div>

  </div>

</div>
