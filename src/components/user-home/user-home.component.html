<div class="page-shell">

  <!-- Welcome Hero -->
  <div class="welcome-hero">
    <div class="welcome-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="12" rx="2" stroke="#C9A84C" stroke-width="2" fill="none"/>
        <path d="M6 10h12M6 14h8" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h2 #user class="welcome-title"></h2>
    <p class="welcome-sub">Access your account and manage your finances securely</p>
  </div>

  <!-- Feature Cards -->
  <section class="cards-grid">

    <div class="feature-card">
      <div class="feature-card-top">
        <div class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="6" width="20" height="12" rx="2" stroke="#C9A84C" stroke-width="2" fill="none"/>
            <path d="M6 10h12M6 14h8" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="feature-text">
          <h5>My Account</h5>
          <p>View your account balance and recent transactions</p>
        </div>
      </div>
      <button class="feature-btn" routerLink="/user/account">
        Get Started <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <div class="feature-card">
      <div class="feature-card-top">
        <div class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3v18h18" stroke="#C9A84C" stroke-width="2" fill="none"/>
            <path d="M7 12l4-4 4 4 6-6" stroke="#C9A84C" stroke-width="2" fill="none"/>
          </svg>
        </div>
        <div class="feature-text">
          <h5>Transaction History</h5>
          <p>Browse and filter all your transactions</p>
        </div>
      </div>
      <button class="feature-btn" routerLink="/user/transactions">
        Get Started <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <div class="feature-card">
      <div class="feature-card-top">
        <div class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1v22" stroke="#C9A84C" stroke-width="2"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#C9A84C" stroke-width="2"/>
          </svg>
        </div>
        <div class="feature-text">
          <h5>Fund Transfer</h5>
          <p>Transfer money to other accounts securely</p>
        </div>
      </div>
      <button class="feature-btn" routerLink="/user/transfer">
        Get Started <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

  </section>

</div>
